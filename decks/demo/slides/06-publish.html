<body class="slide">
  <h1>GitHub Pages で公開</h1>
  <ul>
    <li><code>./scripts/build.sh</code> で <code>dist/</code> にサイト一式を集約</li>
    <li>変換なし — engine / design-system / decks をそのままコピー</li>
    <li>デッキ一覧の <code>index.html</code> を自動生成</li>
    <li><code>dist/</code> をサイトルートとして GitHub Pages が配信</li>
  </ul>
  <p class="muted">キー操作: ←→ / Space でページ送り、o で一覧、?page=3 で直接ジャンプ(旧 #/3 も可)</p>
