<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>自己紹介</title>
  <link rel="stylesheet" href="../design-system/system.css">
  <style>
    /* このスライドだけ移植元(should_track_web_platform_trends の self-intro)の
       見た目を踏襲する意図的な例外。配色・フォント・寸法を公開ページの実測値に
       合わせている。元デッキは 980x552 キャンバス(1rem = 16px)なので、
       1280x720 へ等倍換算した --rem 単位で元 CSS の値をそのまま書き写す。
       .slide より詳細度を上げないと共有シート(adoptedStyleSheets)に負ける */
    .slide.layout-freeform {
      --rem: calc(16px * 720 / 552);
      --color-bg: #c1d3db;
      --color-ink: #05061d;
      --color-on-ink: #ffffff;

      /* 元テーマの .slidev-layout 相当 */
      padding: calc(2.5 * var(--rem)) calc(3.5 * var(--rem));
      font-family: 'Avenir Next', ui-sans-serif, system-ui, -apple-system,
        'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      font-size: calc(1.2 * var(--rem));
      line-height: 1.5;
    }
    .slide.layout-freeform p {
      margin: 0;
      font-size: inherit;
      line-height: calc(1.5 * var(--rem));
    }
    .intro {
      /* 単体表示では body の高さが auto で % が効かないため、
         固定キャンバス(720px)から確定値で導出する */
      height: calc(720px - 5 * var(--rem));
      display: grid;
      grid-template-columns: 6fr 4fr;
      grid-template-rows: 100%;
    }
    .intro .left {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 4fr 6fr;
    }
    .intro .name {
      display: grid;
      grid-template-columns: auto 1fr;
      place-items: center;
      gap: calc(1.2 * var(--rem));
    }
    .intro .real-name {
      background: var(--color-ink);
      color: var(--color-on-ink);
      width: fit-content;
    }
    .intro .real-name .container {
      display: block;
      margin: calc(0.8 * var(--rem)) calc(1.2 * var(--rem));
    }
    .intro .real-name .label {
      font-size: calc(1.5 * var(--rem));
    }
    .intro .real-name .value {
      font-size: calc(1.8 * var(--rem));
      display: inline-flex;
      gap: calc(0.5 * var(--rem));
    }
    .intro .real-name rt {
      font-size: calc(0.8 * var(--rem));
      margin-bottom: calc(0.1 * var(--rem));
    }
    .intro .screen-name {
      display: flex;
      align-items: center;
      gap: calc(0.2 * var(--rem));
      width: 100%;
    }
    .intro .screen-name .label {
      display: flex;
      gap: calc(0.1 * var(--rem));
    }
    .intro .screen-name a {
      text-decoration: none;
    }
    /* 元 SVG は fill 未指定(= 黒)なので currentColor にはしない。
       display: block は元デッキのリセット CSS(kiso.css)由来 */
    .intro .screen-name svg {
      display: block;
      width: calc(2.4 * var(--rem));
      height: calc(2.4 * var(--rem));
    }
    .intro .screen-name .value {
      font-size: calc(2 * var(--rem));
      /* 元 CSS は 900 だがビルドで bolder に変換されており、実表示は 700 */
      font-weight: 700;
    }
    .intro .description {
      padding-left: var(--rem);
    }
    /* 元と同じ通常の disc マーカーに戻す(システムのアクセント色ドットを打ち消す) */
    .slide.layout-freeform .description ul {
      list-style: disc;
      display: flex;
      flex-direction: column;
      gap: var(--rem);
      font-size: calc(1.5 * var(--rem));
      margin: 0;
      padding: 0;
    }
    .slide.layout-freeform .description ul > li {
      font-size: inherit;
      margin: 0 0 0 1.1em;
      padding: 0 0 0 0.2em;
      line-height: 1.8em;
    }
    .slide.layout-freeform .description ul > li::before {
      content: none;
    }
    .intro .right {
      width: 100%;
      height: 100%;
      /* 元テーマの「先頭要素以外の直後の要素」に付く margin-top: 1rem を踏襲 */
      margin-top: var(--rem);
    }
    .intro .right img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body class="slide layout-freeform">

            <ruby>隼輔 <rp>(</rp><rt>しゅんすけ</rt><rp>)</rp></ruby>

      </div>
      <!-- 箇条書きはデッキごとに発表内容へ寄せて差し替える -->
      <div class="description">
        <ul>
          <li>Web Frontend Engineer</li>

    </div>
    <div class="right">
      <img src="../assets/progfay.png" alt="眞野隼輔の写真">

  </div>
  <aside class="notes">
    自己紹介スライド。名前・SNS アカウント・トピックに合わせた紹介文を載せる。

  </aside>
